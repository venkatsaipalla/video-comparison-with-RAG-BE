# Render Blueprint — video-rag-brain (cognitive / FastAPI layer)
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: connect repo → Render auto-detects this file → set secret env vars in dashboard.
# GPU retrieval service must be deployed separately (not on Vercel/Render serverless).

databases:
  - name: adk-sessions
    plan: free
    databaseName: adk_sessions
    user: adk

services:
  - type: web
    name: video-rag-brain
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: video-rag-brain
      # --- secrets (set in Render dashboard or sync from linked services) ---
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_API_KEY
        generateValue: true
      - key: RETRIEVAL_BASE_URL
        sync: false
      - key: RETRIEVAL_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Persistent ADK sessions (recommended on Render; do not use sqlite:///./gadk.db)
      - key: ADK_DATABASE_URL
        fromDatabase:
          name: adk-sessions
          property: connectionString
      # Model tiers (LiteLLM / OpenAI)
      - key: MODEL_ROUTER
        value: openai/gpt-5-nano
      - key: MODEL_WORKER
        value: openai/gpt-5-mini
      - key: MODEL_SYNTH
        value: openai/gpt-5-mini
