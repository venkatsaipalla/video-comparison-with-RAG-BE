services:
  - type: web
    name: creatorjoy-rag-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: YTDLP_COOKIES_B64
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MAX_VIDEO_DURATION_SEC
        value: "1800"
      - key: WHISPER_ENABLED
        value: "false"
      - key: TOP_K_CHUNKS
        value: "12"
